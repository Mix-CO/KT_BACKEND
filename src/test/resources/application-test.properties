# Supabase real ? misma BD que local
spring.datasource.url=${SUPABASE_URL}
spring.datasource.username=${SUPABASE_USERNAME}
spring.datasource.password=${SUPABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT
jwt.secret=test-secret-key-for-testing-purposes-only-kicktime
jwt.expiration=3600000

# Groq (dummy)
groq.api.key=test-dummy-key-not-real

# OAuth2 (dummy)
spring.security.oauth2.client.registration.google.client-id=test-dummy-client-id
spring.security.oauth2.client.registration.google.client-secret=test-dummy-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile