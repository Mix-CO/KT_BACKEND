name: Backend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Pruebas + JaCoCo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Permisos mvnw
        run: chmod +x mvnw

      - name: Ejecutar pruebas + JaCoCo
        env:
          GROQ_API_KEY: test
          GOOGLE_CLIENT_ID: test-dummy-client-id
          GOOGLE_CLIENT_SECRET: test-dummy-client-secret
          SPRING_DATASOURCE_URL: ${{ secrets.SUPABASE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SUPABASE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
        run: ./mvnw verify

      - name: Publicar reporte JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7