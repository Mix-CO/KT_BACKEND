name: Reusable Backend CI

on:
  workflow_call:
    secrets:
      SONAR_TOKEN:
        required: true
      SUPABASE_URL:
        required: true
      SUPABASE_USERNAME:
        required: true
      SUPABASE_PASSWORD:
        required: true

jobs:
  build-test-analyze:
    name: Build · Test · Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Cache SonarCloud
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar

      - name: Permisos mvnw
        run: chmod +x mvnw

      - name: Tests + JaCoCo + SonarCloud
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # Datasource
          SPRING_DATASOURCE_URL: jdbc:postgresql://${{ secrets.SUPABASE_URL }}:5432/postgres
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SUPABASE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
          # Groq
          GROQ_API_KEY: test-dummy-key-not-real
          # Google OAuth2
          GOOGLE_CLIENT_ID: test-dummy-client-id
          GOOGLE_CLIENT_SECRET: test-dummy-client-secret
        run: |
          ./mvnw verify sonar:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=la-seleccion \
            -Dsonar.projectKey=Mix-CO_KT_BACKEND \
            -Dsonar.projectName="KickTime Backend" \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.qualitygate.wait=true

      - name: Publicar reporte JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7